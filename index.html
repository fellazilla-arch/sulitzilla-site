<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Pixel Price List – Sulitzilla</title>
    <link rel="stylesheet" href="/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <div class="nav-left">
                <div class="logo">
                    <a href="/"><img src="/logo.png" alt="Sulitzilla" /></a>
                </div>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <section class="pricing-header">
            <h1 class="pricing-title">Google Pixel Price List</h1>
            <p id="pricing-last-updated" class="pricing-last-updated" aria-live="polite"></p>
            <button type="button" id="refresh-prices-btn" class="refresh-prices-btn hidden" aria-hidden="true">Refresh prices</button>
        </section>

        <p class="pricing-warranty-note">All orders come with a free case, screen protector or tempered glass, and Sulitzilla's 30-day warranty.</p>

        <section class="pricing-list-section" aria-label="Pixel price list">
            <div id="pricing-loading" class="pricing-loading" hidden aria-live="polite">
                <div class="pricing-loading-spinner" aria-hidden="true"></div>
                <span class="pricing-loading-text">Loading prices…</span>
            </div>
            <div id="pricing-list" class="pricing-list" aria-live="polite"></div>
            <p id="pricing-empty-state" class="pricing-empty" hidden>No models available.</p>
        </section>
    </main>

    <script>window.GRIST_PRICES_URL = '/api/prices';</script>
    <script src="/script.js"></script>
</body>
</html>
